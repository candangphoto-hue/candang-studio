<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Báo Giá Tự Động – Can Đăng Studio</title>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script>if(typeof docx==='undefined'){document.write('<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"><\/script>')}</script>
<script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Times New Roman', Times, serif; font-size: 13pt; line-height: 1.2; background: #e8e8e8; color: #000; }
.mobile-tabs { display: none; }
.app-wrap { display: flex; gap: 0; min-height: 100vh; }
.form-panel { width: 320px; flex-shrink: 0; background: #1e2a3a; color: #eee; padding: 20px 16px 30px; overflow-y: auto; position: sticky; top: 0; height: 100vh; }
.form-panel h2 { font-family: Arial, sans-serif; font-size: 13pt; font-weight: bold; color: #fff; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 2px solid #4a7fc1; letter-spacing: 0.5px; }
.form-section { margin-bottom: 18px; }
.form-section-title { font-family: Arial, sans-serif; font-size: 9pt; font-weight: bold; color: #7ab3e0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; padding-bottom: 4px; border-bottom: 1px solid #2e3e54; }
.form-panel label { display: block; font-family: Arial, sans-serif; font-size: 9pt; color: #bbb; margin-bottom: 3px; margin-top: 8px; }
.form-panel label:first-of-type { margin-top: 0; }
.form-panel input[type="text"], .form-panel input[type="number"], .form-panel select { width: 100%; padding: 6px 8px; background: #253447; border: 1px solid #3a5070; border-radius: 4px; color: #fff; font-family: 'Times New Roman', serif; font-size: 11pt; line-height: 1.3; }
.form-panel input:focus, .form-panel select:focus { outline: none; border-color: #4a7fc1; background: #2c3f56; }
.form-panel select option { background: #253447; }
.pkg-check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; }
.pkg-check-row input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; accent-color: #4a7fc1; flex-shrink: 0; }
.pkg-check-row span { font-family: Arial, sans-serif; font-size: 10pt; color: #ddd; }
.pkg-fields { background: #253447; border: 1px solid #3a5070; border-radius: 4px; padding: 10px 10px 4px; margin-bottom: 10px; }
.pkg-fields label { margin-top: 6px; }
.pkg-fields label:first-of-type { margin-top: 0; }
.vat-note { font-family: Arial, sans-serif; font-size: 8.5pt; color: #7ab3e0; margin-top: 6px; font-style: italic; }
.btn-export { width: 100%; padding: 12px 10px; background: #2a6fc9; color: #fff; border: none; border-radius: 6px; font-family: Arial, sans-serif; font-size: 12pt; font-weight: bold; cursor: pointer; margin-top: 6px; transition: background 0.2s; }
.btn-export:hover { background: #3a82e0; }
.pkg-divider { border-top: 1px solid #2e3e54; margin: 14px 0 10px; }

/* ===== EXTRA COSTS ===== */
.extra-costs-wrap { margin-top: 10px; padding-top: 8px; border-top: 1px dashed #3a5070; }
.extra-costs-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.extra-costs-hdr span { font-family: Arial, sans-serif; font-size: 8.5pt; color: #7ab3e0; font-style: italic; }
.btn-add-extra { padding: 3px 8px; background: #1e4f8f; color: #dce9f8; border: 1px solid #3a6db0; border-radius: 3px; font-family: Arial, sans-serif; font-size: 8pt; cursor: pointer; }
.btn-add-extra:hover { background: #2a6fc9; }
.extra-row { display: flex; gap: 4px; align-items: center; margin-bottom: 5px; }
.extra-row input[type="text"] { flex: 2; min-width: 0; }
.extra-row input[type="number"] { flex: 1.2; min-width: 0; }
.btn-rm-extra { flex-shrink: 0; width: 24px; height: 26px; background: #7b1e1e; color: #ffcdd2; border: none; border-radius: 3px; cursor: pointer; font-size: 14pt; line-height: 1; display: flex; align-items: center; justify-content: center; padding: 0; }
.btn-rm-extra:hover { background: #c0392b; }

/* ===== PREVIEW ===== */
.preview-area { flex: 1; padding: 24px 24px 40px; overflow-y: auto; }
.preview-label { text-align: center; font-family: Arial, sans-serif; font-size: 9pt; color: #777; margin-bottom: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
.doc { background: #fff; width: 210mm; min-height: 297mm; margin: 0 auto; padding: 20mm 22mm 22mm; box-shadow: 0 4px 24px rgba(0,0,0,0.18); font-family: 'Times New Roman', Times, serif; font-size: 13pt; line-height: 1.2; color: #000; }
.doc-title { text-align: center; font-size: 15pt; font-weight: bold; text-transform: uppercase; margin-bottom: 14px; line-height: 1.3; }
.doc-header-info { margin-bottom: 14px; text-align: right; }
.doc-header-info p { margin-bottom: 3px; line-height: 1.4; }
.doc p { margin-bottom: 6px; line-height: 1.4; }
.doc ul { margin-left: 22px; margin-bottom: 8px; }
.doc ul li { margin-bottom: 3px; line-height: 1.4; }
.cell-list { margin: 5px 0 2px 0; padding-left: 1.3em; list-style-type: disc; }
.cell-list li { margin-bottom: 4px; line-height: 1.4; font-size: 12pt; }
.doc-spacer { height: 10px; }

/* ===== TABLES ===== */
.baogia-table { width: 100%; border-collapse: collapse; margin-bottom: 18px; font-family: 'Times New Roman', Times, serif; font-size: 12pt; line-height: 1.3; border-radius: 4px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.10); }
.baogia-table th, .baogia-table td { border: 1px solid #c8d8ee; padding: 7px 9px; vertical-align: top; text-align: left; }
.baogia-table thead th { text-align: center; font-weight: bold; background: #2d5090; color: #fff; vertical-align: middle; font-size: 12pt; border-color: #4a6aaa; letter-spacing: 0.2px; padding: 9px; }
.baogia-table .col-stt { width: 5%; text-align: center; }
.baogia-table .col-nd  { width: 44%; }
.baogia-table .col-dvt { width: 10%; text-align: center; }
.baogia-table .col-dg  { width: 13%; text-align: right; }
.baogia-table .col-tg  { width: 11%; text-align: center; }
.baogia-table .col-tt  { width: 13%; text-align: right; }
.baogia-table tbody tr:first-child td:nth-child(2) { border-left: 3px solid #2d5090; }
.baogia-table .row-summary td { font-weight: bold; background-color: #eaf1fb; color: #2d5090; }
.baogia-table .row-vat td { font-weight: bold; background-color: #fdf6e3; color: #5a3e00; }
.baogia-table .row-total td { font-weight: bold; font-size: 13pt; background: #2d5090; color: #fff; border-color: #4a6aaa; }
.baogia-table .row-vip td { background-color: #fffbf0; border-left: 3px solid #e6a817; }
.baogia-table .row-extra td { background-color: #f5f8ff; color: #333; font-size: 12pt; }

.pkg-heading { font-size: 13pt; font-weight: bold; margin: 14px 0 4px 0; line-height: 1.3; }
.pkg-subheading { font-size: 12pt; font-weight: bold; margin: 0 0 6px 0; font-style: italic; line-height: 1.35; }
.portfolio-link { margin: 12px 0 6px; }
.portfolio-link a { color: #1155cc; text-decoration: underline; font-weight: bold; }
.payment-section { margin-top: 10px; }
.bank-block { margin: 6px 0 6px 20px; line-height: 1.5; }
.closing { margin-top: 18px; font-weight: bold; font-size: 13pt; text-align: center; }
.mobile-export { display: none; }

@media print {
  body { background: #fff; }
  .form-panel, .preview-label, .mobile-tabs, .mobile-export { display: none !important; }
  .app-wrap { display: block; }
  .preview-area { padding: 0; }
  .doc { box-shadow: none; margin: 0; padding: 15mm 20mm; width: 100%; }
}

@media (max-width: 768px) {
  .mobile-tabs { display: flex; position: fixed; top: 0; left: 0; right: 0; z-index: 200; background: #1e2a3a; border-bottom: 2px solid #4a7fc1; height: 50px; }
  .tab-btn { flex: 1; padding: 0 10px; background: transparent; color: #8ba8c8; border: none; border-bottom: 3px solid transparent; font-family: Arial, sans-serif; font-size: 11pt; font-weight: bold; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
  .tab-btn.active { color: #fff; border-bottom-color: #4a7fc1; }
  .app-wrap { display: block; padding-top: 50px; padding-bottom: 64px; }
  .form-panel { width: 100%; height: auto; position: relative; overflow-y: visible; display: none; }
  .form-panel.tab-active { display: block; }
  .form-panel input[type="text"], .form-panel input[type="number"], .form-panel select { padding: 10px 10px; font-size: 13pt; min-height: 44px; }
  .pkg-check-row input[type="checkbox"] { width: 20px; height: 20px; }
  .pkg-check-row span { font-size: 12pt; }
  .form-panel .btn-export { display: none; }
  .preview-area { padding: 10px 8px 10px; overflow-x: hidden; display: none; }
  .preview-area.tab-active { display: block; }
  .doc { transform-origin: top left; }
  .mobile-export { display: block; position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 16px; background: #1e2a3a; border-top: 1px solid #3a5070; z-index: 200; }
  .mobile-export button { width: 100%; padding: 13px; background: #2a6fc9; color: #fff; border: none; border-radius: 6px; font-family: Arial, sans-serif; font-size: 13pt; font-weight: bold; cursor: pointer; }
  .preview-label { font-size: 8pt; margin-bottom: 8px; }
}

#cd-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-family: Arial, sans-serif; font-weight: 600; z-index: 999; display: none; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.25); pointer-events: none; transition: opacity 0.3s; }
</style>
</head>
<body>
<div id="cd-toast"></div>

<div class="mobile-tabs">
  <button class="tab-btn active" id="tabForm" onclick="showTab('form')">📝 Nhập liệu</button>
  <button class="tab-btn" id="tabPreview" onclick="showTab('preview')">👁 Xem trước</button>
</div>

<div class="app-wrap">
  <div class="form-panel tab-active" id="formPanel">
    <h2>⚙ Nhập thông tin báo giá</h2>

    <div class="form-section">
      <div class="form-section-title">Thông tin chung</div>
      <label>Tên khách hàng</label>
      <input type="text" id="tenKH" placeholder="VD: Nhà hàng ABC..." oninput="render()">
      <label>Tháng thực hiện</label>
      <input type="text" id="thang" placeholder="VD: 05" oninput="render()">
      <label>Năm thực hiện</label>
      <input type="text" id="nam" placeholder="VD: 2026" oninput="render()">
      <label>Loại sản phẩm</label>
      <select id="loai" onchange="render()">
        <option value="món ăn">Món ăn</option>
        <option value="đồ uống">Đồ uống</option>
        <option value="sản phẩm">Sản phẩm</option>
        <option value="món ăn / đồ uống">Món ăn / Đồ uống</option>
        <option value="sản phẩm / món ăn / đồ uống">Sản phẩm / Món ăn / Đồ uống</option>
      </select>
      <label>Địa điểm chụp</label>
      <select id="diaDiem" onchange="render()">
        <option value="Studio">Studio</option>
        <option value="địa điểm khách hàng">Địa điểm khách hàng</option>
      </select>
      <label id="labelSlMonYC">Số lượng món (yêu cầu)</label>
      <input type="text" id="slMonYC" placeholder="VD: 15" oninput="render()">
    </div>

    <div class="form-section">
      <div class="form-section-title">Chọn gói dịch vụ</div>

      <!-- Gói 1 -->
      <label class="pkg-check-row">
        <input type="checkbox" id="chk1" onchange="togglePkg(1); render();" checked>
        <span>Gói 1 – Cơ bản</span>
      </label>
      <div class="pkg-fields" id="fields1">
        <label>Chi phí dịch vụ (vnđ)</label>
        <input type="number" id="cp1" value="6000000" min="0" oninput="render()">
        <label id="labelSl1">Số lượng món</label>
        <input type="number" id="sl1" value="12" min="1" oninput="render()">
        <label>Số ảnh chỉnh sửa</label>
        <input type="number" id="anh1" value="24" min="1" oninput="render()">
        <div class="extra-costs-wrap">
          <div class="extra-costs-hdr">
            <span>Chi phí bổ sung</span>
            <button type="button" class="btn-add-extra" onclick="addExtra(1)">+ Thêm</button>
          </div>
          <div id="extRows1"></div>
        </div>
      </div>

      <!-- Gói 2 -->
      <label class="pkg-check-row">
        <input type="checkbox" id="chk2" onchange="togglePkg(2); render();">
        <span>Gói 2 – Stylist</span>
      </label>
      <div class="pkg-fields" id="fields2" style="display:none;">
        <label>Chi phí dịch vụ (vnđ)</label>
        <input type="number" id="cp2" value="8000000" min="0" oninput="render()">
        <label id="labelSl2">Số lượng món</label>
        <input type="number" id="sl2" value="20" min="1" oninput="render()">
        <label>Số ảnh chỉnh sửa</label>
        <input type="number" id="anh2" value="40" min="1" oninput="render()">
        <div class="extra-costs-wrap">
          <div class="extra-costs-hdr">
            <span>Chi phí bổ sung</span>
            <button type="button" class="btn-add-extra" onclick="addExtra(2)">+ Thêm</button>
          </div>
          <div id="extRows2"></div>
        </div>
      </div>

      <!-- Gói 3 -->
      <label class="pkg-check-row">
        <input type="checkbox" id="chk3" onchange="togglePkg(3); render();">
        <span>Gói 3 – Cao cấp</span>
      </label>
      <div class="pkg-fields" id="fields3" style="display:none;">
        <label>Chi phí dịch vụ (vnđ)</label>
        <input type="number" id="cp3" value="13000000" min="0" oninput="render()">
        <label id="labelSl3">Số lượng sản phẩm / món</label>
        <input type="number" id="sl3" value="25" min="1" oninput="render()">
        <label>Số ảnh chỉnh sửa</label>
        <input type="number" id="anh3" value="50" min="1" oninput="render()">
        <div class="extra-costs-wrap">
          <div class="extra-costs-hdr">
            <span>Chi phí bổ sung</span>
            <button type="button" class="btn-add-extra" onclick="addExtra(3)">+ Thêm</button>
          </div>
          <div id="extRows3"></div>
        </div>
      </div>

      <div class="vat-note">VAT mặc định 8% — tự động tính cho từng gói.</div>

      <!-- Divider -->
      <div class="pkg-divider"></div>
      <div class="form-section-title" style="margin-bottom:8px;">Gói tách biệt</div>

      <!-- Gói Nền Trắng -->
      <label class="pkg-check-row">
        <input type="checkbox" id="chkNT" onchange="togglePkg('NT'); render();">
        <span id="labelChkNT">Gói chụp ảnh nền trắng</span>
      </label>
      <div class="pkg-fields" id="fieldsNT" style="display:none;">
        <label>Đơn giá / sản phẩm (vnđ)</label>
        <input type="number" id="dgNT" value="80000" min="0" oninput="render()">
        <label id="labelSlNT">Số lượng sản phẩm</label>
        <input type="number" id="slNT" value="10" min="1" oninput="render()">
        <label>Số ảnh chỉnh sửa / sản phẩm</label>
        <input type="number" id="anhNT" value="2" min="1" oninput="render()">
        <div class="extra-costs-wrap">
          <div class="extra-costs-hdr">
            <span>Chi phí bổ sung</span>
            <button type="button" class="btn-add-extra" onclick="addExtra('NT')">+ Thêm</button>
          </div>
          <div id="extRowsNT"></div>
        </div>
      </div>
    </div>

    <button class="btn-export" onclick="exportWord()">📥 Xuất file Word (.docx)</button>
  </div>

  <div class="preview-area" id="previewArea">
    <div class="preview-label">▸ Preview — cập nhật theo thời gian thực</div>
    <div class="doc" id="doc"></div>
  </div>
</div>

<div class="mobile-export">
  <button onclick="exportWord()">📥 Xuất file Word (.docx)</button>
</div>

<script>
const VAT = 0.08;

// ── Extra costs state: keyed by pkg number (1,2,3) or 'NT'
const extras = {1:[], 2:[], 3:[], NT:[]};

function v(id)   { return document.getElementById(id).value.trim(); }
function chk(id) { return document.getElementById(id).checked; }
function num(id) { return parseFloat(document.getElementById(id).value) || 0; }
function fmt(n)  { return (n||0).toLocaleString('vi-VN'); }
function isSP(loai) { return loai.includes('sản phẩm'); }

function calcPkg(cp, extraTotal) {
  extraTotal = extraTotal || 0;
  const chiPhi = Math.round(cp) + Math.round(extraTotal);
  const vat    = Math.round(chiPhi * VAT);
  const total  = chiPhi + vat;
  return { chiPhi, vat, total };
}

function getExtraTotal(key) {
  return (extras[key]||[]).reduce(function(s,e){ return s + (parseFloat(e.amt)||0); }, 0);
}

function addExtra(key) {
  extras[key].push({name:'', amt:0});
  renderExtrasForm(key);
  render();
}

function removeExtra(key, idx) {
  extras[key].splice(idx, 1);
  renderExtrasForm(key);
  render();
}

function updateExtra(key, idx, field, val) {
  if (!extras[key] || !extras[key][idx]) return;
  if (field === 'name') extras[key][idx].name = val;
  else extras[key][idx].amt = parseFloat(val) || 0;
  render();
}

function renderExtrasForm(key) {
  var container = document.getElementById('extRows' + key);
  if (!container) return;
  var k = (key === 'NT') ? '"NT"' : key;
  container.innerHTML = extras[key].map(function(e, i) {
    var safeName = (e.name||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    return '<div class="extra-row">'
      + '<input type="text" value="' + safeName + '" placeholder="Tên chi phí..." '
      + 'oninput="updateExtra(' + k + ',' + i + ',\'name\',this.value)">'
      + '<input type="number" value="' + (e.amt||'') + '" placeholder="Số tiền" min="0" '
      + 'oninput="updateExtra(' + k + ',' + i + ',\'amt\',this.value)">'
      + '<button type="button" class="btn-rm-extra" onclick="removeExtra(' + k + ',' + i + ')">×</button>'
      + '</div>';
  }).join('');
}

function togglePkg(n) {
  document.getElementById('fields' + n).style.display =
    document.getElementById('chk' + n).checked ? 'block' : 'none';
}

// ──────────────────────────────────────────────
// BUILD HTML PREVIEW TABLE cho gói 1/2/3
// ──────────────────────────────────────────────
function buildPkgTable(pkgNum, chiPhi, slMon, slAnh, loai) {
  var extTotal = getExtraTotal(pkgNum);
  var calc = calcPkg(chiPhi, extTotal);
  var cp = calc.chiPhi, vat = calc.vat, total = calc.total;
  var sp = isSP(loai);
  var donVi    = sp ? 'sản phẩm' : 'món/set';
  var phatSinh = sp ? 'Phát sinh sản phẩm + 200.000vnđ/1 ảnh'
                    : 'Phát sinh món ăn + 300.000vnđ/1 món';

  var heading = '', subheading = '', col1Content = '', thoiGian = '', extraRows = '';

  if (pkgNum === 1) {
    heading  = 'Gói 1: Gói chụp ảnh quảng cáo cơ bản';
    thoiGian = '9h – 15h';
    col1Content = '<strong>Gói chụp ảnh quảng cáo cơ bản</strong>'
      + '<ul class="cell-list">'
      + '<li>Số lượng: ' + slMon + ' ' + donVi + '</li>'
      + '<li>Bối cảnh, đạo cụ cơ bản</li>'
      + '<li>Chỉnh sửa ' + slAnh + ' ảnh hoàn thiện</li>'
      + '<li>' + phatSinh + '</li>'
      + '</ul>';
  }

  if (pkgNum === 2) {
    heading  = 'Gói 2: Gói chụp ảnh quảng cáo Stylist';
    thoiGian = '9h – 17h';
    var dc = sp ? 'điều chỉnh sản phẩm phù hợp với chụp ảnh'
                : 'điều chỉnh món ăn phù hợp với chụp ảnh';
    col1Content = '<strong>Gói chụp ảnh concept có Foodstylist</strong>'
      + '<ul class="cell-list">'
      + '<li>Số lượng: ' + slMon + ' ' + donVi + '</li>'
      + '<li>Đạo cụ, bối cảnh phù hợp với concept chụp</li>'
      + '<li>Foodstylist trang trí, ' + dc + '</li>'
      + '<li>Chỉnh sửa ' + slAnh + ' ảnh hoàn thiện</li>'
      + '<li>' + phatSinh + '</li>'
      + '</ul>';
  }

  if (pkgNum === 3) {
    var loaiLabel = sp ? 'sản phẩm' : 'món ăn';
    heading    = 'Gói 3: Gói chụp ảnh concept ' + loaiLabel + ' cao cấp';
    subheading = 'Foodstylist lên ý tưởng sáng tạo, đề xuất concept chụp, chuẩn bị đạo cụ bối cảnh cho dự án chụp hình';
    thoiGian   = '1 ngày';
    var ps3 = sp
      ? 'Phát sinh ngoài ' + slMon + ' sản phẩm + 200.000vnđ/1 ảnh'
      : 'Phát sinh ngoài ' + slMon + ' món ăn + 300.000vnđ/1 món (set)';
    col1Content = '<strong>Gói chụp ảnh quảng cáo cao cấp</strong>'
      + '<ul class="cell-list">'
      + '<li>Máy ảnh in ấn khổ lớn</li>'
      + '<li>Số lượng: dưới ' + slMon + ' ' + donVi + '</li>'

async function _dlBlob(blob, name) {
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if (isMobile && navigator.share && navigator.canShare) {
    try {
      var sf = new File([blob], name, {type: blob.type || 'application/octet-stream'});
      if (navigator.canShare({files: [sf]})) { await navigator.share({files:[sf],title:name}); return; }
    } catch(e) { if(e.name==='AbortError') return; }
  }
  if (typeof saveAs !== 'undefined') { saveAs(blob, name); return; }
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
}

async function exportWord() {

  const {Document,Paragraph,TextRun,Table,TableRow,TableCell,
         AlignmentType,WidthType,BorderStyle,ShadingType,VerticalAlign,Packer}=docx;

  const tenKH=v('tenKH')||'Khách hàng', thang=v('thang')||'....', nam=v('nam')||'....';
  const loai=v('loai'), diaDiem=v('diaDiem'), slMonYC=v('slMonYC')||'.....', sp=isSP(loai);

  const btnD=document.querySelector('.btn-export'), btnM=document.querySelector('.mobile-export button');
  [btnD,btnM].forEach(b=>{if(b){b._orig=b._orig||b.innerHTML;b.innerHTML='⏳ Đang tạo...';b.disabled=true;}});
  const done=()=>[btnD,btnM].forEach(b=>{if(b){b.innerHTML='✅ Xong!';b.disabled=false;setTimeout(()=>b.innerHTML=b._orig,3000);}});

  const FN='Times New Roman';
  const DB='2D5090',LB='EAF1FB',GB='FDF6E3',GT='5A3E00',VB='FFFBF0',WH='FFFFFF';

  function T(text,o={}){return new TextRun({text,bold:o.bold||false,italic:o.italic||false,size:(o.sz||13)*2,font:FN,color:o.col||'000000'});}
  function P(text,o={}){
    const runs=typeof text==='string'?[T(text,o)]:text;
    return new Paragraph({alignment:o.align||AlignmentType.LEFT,spacing:{before:o.before||0,after:o.after!==undefined?o.after:80},indent:o.indent?{left:o.indent}:undefined,children:runs});
  }
  function BUL(text,o={}){return P('• '+text,{...o,indent:360,after:o.after!==undefined?o.after:60,sz:o.sz||13});}
  function CBUL(text,o={}){return P('• '+text,{...o,indent:160,after:40,sz:12});}
  function SP(n=80){return new Paragraph({spacing:{after:n},children:[T('')]});}

  const BG={style:BorderStyle.SINGLE,size:4,color:'C8D8EE'};
  const BD={style:BorderStyle.SINGLE,size:6,color:'4A6AAA'};
  const BL={style:BorderStyle.SINGLE,size:18,color:'2D5090'};
  const sh=fill=>({fill,type:ShadingType.CLEAR,color:'auto'});

  const CM={top:100,bottom:100,left:150,right:120};
  const CMH={top:110,bottom:110,left:130,right:130};
  function mkC(paras,o={}){return new TableCell({width:o.w?{size:o.w,type:WidthType.DXA}:undefined,columnSpan:o.cs,shading:o.bg?sh(o.bg):undefined,verticalAlign:o.va||VerticalAlign.TOP,borders:{top:BG,bottom:BG,left:o.boldL?BL:BG,right:BG},margins:CM,children:paras});}
  function mkH(text,w){return new TableCell({width:{size:w,type:WidthType.DXA},shading:sh(DB),verticalAlign:VerticalAlign.CENTER,borders:{top:BD,bottom:BD,left:BD,right:BD},margins:CMH,children:[P(text,{align:AlignmentType.CENTER,before:0,after:0,bold:true,sz:12,col:WH})]});}
  function mkDk(paras,o={}){return new TableCell({width:o.w?{size:o.w,type:WidthType.DXA}:undefined,columnSpan:o.cs,shading:sh(DB),verticalAlign:VerticalAlign.CENTER,borders:{top:BD,bottom:BD,left:BD,right:BD},margins:CMH,children:paras});}

  // Column widths DXA: STT, Nội dung, ĐVT, Đơn giá, Thời gian, Thành tiền
  const W=[470,4100,940,1210,1030,1210];
  const tW=W.reduce((a,b)=>a+b,0);

  // Build extra cost rows for docx
  function mkExtraCostRows(key) {
    return (extras[key]||[]).map(ext => new TableRow({children:[
      mkC([P('—',{sz:12,align:AlignmentType.CENTER,after:0})],{w:W[0],va:VerticalAlign.CENTER}),
      mkC([P(ext.name||'[Tên chi phí]',{bold:true,sz:12,after:0})],{w:W[1]}),
      mkC([P('—',{sz:12,align:AlignmentType.CENTER,after:0})],{w:W[2],va:VerticalAlign.CENTER}),
      mkC([P(fmt(ext.amt||0),{sz:12,align:AlignmentType.RIGHT,after:0})],{w:W[3],va:VerticalAlign.CENTER}),
      mkC([P('—',{sz:12,align:AlignmentType.CENTER,after:0})],{w:W[4],va:VerticalAlign.CENTER}),
      mkC([P(fmt(ext.amt||0),{sz:12,align:AlignmentType.RIGHT,after:0})],{w:W[5],va:VerticalAlign.CENTER}),
    ]}));

  function buildPkg(pkgNum){

function convertListsForWord(html){return html;}

function showToast(msg, dur) {
  dur = dur || 2800;
  const t = document.getElementById('cd-toast');
  t.textContent = msg;
  t.style.display = 'block';
  t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(function() {
    t.style.opacity = '0';
    setTimeout(function() { t.style.display = 'none'; }, 300);
  }, dur);
}

function showTab(tab) {
  const formPanel   = document.getElementById('formPanel');
  const previewArea = document.getElementById('previewArea');
  const btnForm     = document.getElementById('tabForm');
  const btnPreview  = document.getElementById('tabPreview');
  if (tab === 'form') {
    formPanel.classList.add('tab-active');
    previewArea.classList.remove('tab-active');
    btnForm.classList.add('active');
    btnPreview.classList.remove('active');
  } else {
    formPanel.classList.remove('tab-active');
    previewArea.classList.add('tab-active');
    btnForm.classList.remove('active');
    btnPreview.classList.add('active');
    scaleDoc();
  }
}

function scaleDoc() {
  if (window.innerWidth > 768) return;
  const area = document.getElementById('previewArea');
  const doc  = document.getElementById('doc');
  if (!area || !doc) return;
  const avail = area.clientWidth - 16;
  const docW  = 794;
  const scale = Math.min(1, avail / docW);
  doc.style.width = docW + 'px';
  doc.style.transform = 'scale(' + scale + ')';
  doc.style.transformOrigin = 'top left';
  const docH = doc.offsetHeight;
  doc.style.marginBottom = '-' + Math.round(docH * (1 - scale)) + 'px';
}

window.addEventListener('resize', function () {
  if (window.innerWidth <= 768) { scaleDoc(); }
  else {
    const doc = document.getElementById('doc');
    doc.style.transform = doc.style.transformOrigin = doc.style.marginBottom = '';
  }
});

window.addEventListener('DOMContentLoaded', function () {
  const now = new Date();
  document.getElementById('thang').value = String(now.getMonth() + 1).padStart(2, '0');
  document.getElementById('nam').value   = now.getFullYear();
  if (window.innerWidth <= 768) {
    showTab('form');
  } else {
    document.getElementById('formPanel').classList.add('tab-active');
    document.getElementById('previewArea').classList.add('tab-active');
  }
  render();
});
