<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Báo Giá Tự Động – Can Đăng Studio</title>
<style>
/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ===== BODY ===== */
body {
  font-family: 'Times New Roman', Times, serif;
  font-size: 13pt;
  line-height: 1.2;
  background: #e8e8e8;
  color: #000;
}

/* ===== MOBILE TAB BAR (hidden on desktop) ===== */
.mobile-tabs {
  display: none;
}

/* ===== APP LAYOUT ===== */
.app-wrap {
  display: flex;
  gap: 0;
  min-height: 100vh;
}

/* ===== FORM PANEL ===== */
.form-panel {
  width: 310px;
  flex-shrink: 0;
  background: #1e2a3a;
  color: #eee;
  padding: 20px 16px 30px;
  overflow-y: auto;
  position: sticky;
  top: 0;
  height: 100vh;
}

.form-panel h2 {
  font-family: Arial, sans-serif;
  font-size: 13pt;
  font-weight: bold;
  color: #fff;
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 2px solid #4a7fc1;
  letter-spacing: 0.5px;
}

.form-section { margin-bottom: 18px; }

.form-section-title {
  font-family: Arial, sans-serif;
  font-size: 9pt;
  font-weight: bold;
  color: #7ab3e0;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  padding-bottom: 4px;
  border-bottom: 1px solid #2e3e54;
}

.form-panel label {
  display: block;
  font-family: Arial, sans-serif;
  font-size: 9pt;
  color: #bbb;
  margin-bottom: 3px;
  margin-top: 8px;
}
.form-panel label:first-of-type { margin-top: 0; }

.form-panel input[type="text"],
.form-panel input[type="number"],
.form-panel select {
  width: 100%;
  padding: 6px 8px;
  background: #253447;
  border: 1px solid #3a5070;
  border-radius: 4px;
  color: #fff;
  font-family: 'Times New Roman', serif;
  font-size: 11pt;
  line-height: 1.3;
}

.form-panel input:focus,
.form-panel select:focus {
  outline: none;
  border-color: #4a7fc1;
  background: #2c3f56;
}

.form-panel select option { background: #253447; }

.pkg-check-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  cursor: pointer;
}

.pkg-check-row input[type="checkbox"] {
  width: 14px;
  height: 14px;
  cursor: pointer;
  accent-color: #4a7fc1;
  flex-shrink: 0;
}

.pkg-check-row span {
  font-family: Arial, sans-serif;
  font-size: 10pt;
  color: #ddd;
}

.pkg-fields {
  background: #253447;
  border: 1px solid #3a5070;
  border-radius: 4px;
  padding: 10px 10px 4px;
  margin-bottom: 10px;
}

.pkg-fields label { margin-top: 6px; }
.pkg-fields label:first-of-type { margin-top: 0; }

.vat-note {
  font-family: Arial, sans-serif;
  font-size: 8.5pt;
  color: #7ab3e0;
  margin-top: 6px;
  font-style: italic;
}

.btn-export {
  width: 100%;
  padding: 12px 10px;
  background: #2a6fc9;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-family: Arial, sans-serif;
  font-size: 12pt;
  font-weight: bold;
  cursor: pointer;
  margin-top: 6px;
  transition: background 0.2s;
}
.btn-export:hover { background: #3a82e0; }

/* ===== PREVIEW AREA ===== */
.preview-area {
  flex: 1;
  padding: 24px 24px 40px;
  overflow-y: auto;
}

.preview-label {
  text-align: center;
  font-family: Arial, sans-serif;
  font-size: 9pt;
  color: #777;
  margin-bottom: 12px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ===== DOCUMENT ===== */
.doc {
  background: #fff;
  width: 210mm;
  min-height: 297mm;
  margin: 0 auto;
  padding: 20mm 22mm 22mm;
  box-shadow: 0 4px 24px rgba(0,0,0,0.18);
  font-family: 'Times New Roman', Times, serif;
  font-size: 13pt;
  line-height: 1.2;
  color: #000;
}

.doc-title {
  text-align: center;
  font-size: 15pt;
  font-weight: bold;
  text-transform: uppercase;
  margin-bottom: 14px;
  line-height: 1.3;
}

.doc-header-info {
  margin-bottom: 14px;
  text-align: right;
}
.doc-header-info p {
  margin-bottom: 3px;
  line-height: 1.4;
}

.doc p { margin-bottom: 6px; line-height: 1.4; }

.doc ul { margin-left: 22px; margin-bottom: 8px; }
.doc ul li { margin-bottom: 3px; line-height: 1.4; }

/* Inner lists (table cells) — hanging indent chuẩn */
.cell-list {
  margin: 5px 0 2px 0;
  padding-left: 1.3em;
  list-style-type: disc;
}
.cell-list li {
  margin-bottom: 4px;
  line-height: 1.4;
  font-size: 12pt;
}

.doc-spacer { height: 10px; }

/* ===== TABLES ===== */
.baogia-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 18px;
  font-family: 'Times New Roman', Times, serif;
  font-size: 12pt;
  line-height: 1.3;
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,0.10);
}

.baogia-table th,
.baogia-table td {
  border: 1px solid #b8cce4;
  padding: 7px 9px;
  vertical-align: top;
  text-align: left;
}

.baogia-table thead th {
  text-align: center;
  font-weight: bold;
  background: linear-gradient(135deg, #1e3a5f 0%, #2a5298 100%);
  color: #fff;
  vertical-align: middle;
  font-size: 12pt;
  border-color: #1a3060;
  letter-spacing: 0.2px;
  padding: 9px;
}

.baogia-table .col-stt { width: 5%;  text-align: center; }
.baogia-table .col-nd  { width: 44%; }
.baogia-table .col-dvt { width: 10%; text-align: center; }
.baogia-table .col-dg  { width: 13%; text-align: right; }
.baogia-table .col-tg  { width: 11%; text-align: center; }
.baogia-table .col-tt  { width: 13%; text-align: right; }

.baogia-table tbody tr:first-child td:nth-child(2) {
  border-left: 3px solid #2a5298;
}

.baogia-table .row-summary td {
  font-weight: bold;
  background-color: #eaf1fb;
  color: #1e3a5f;
}

.baogia-table .row-vat td {
  font-weight: bold;
  background-color: #fdf6e3;
  color: #5a3e00;
}

.baogia-table .row-total td {
  font-weight: bold;
  font-size: 13pt;
  background: linear-gradient(90deg, #1e3a5f 0%, #2a5298 100%);
  color: #fff;
  border-color: #1a3060;
}

.baogia-table .row-vip td {
  background-color: #fffbf0;
  border-left: 3px solid #e6a817;
}

.pkg-heading {
  font-size: 13pt;
  font-weight: bold;
  margin: 14px 0 4px 0;
  line-height: 1.3;
}
.pkg-subheading {
  font-size: 12pt;
  font-weight: bold;
  margin: 0 0 6px 0;
  font-style: italic;
  line-height: 1.35;
}

.portfolio-link { margin: 12px 0 6px; }
.portfolio-link a { color: #1155cc; text-decoration: underline; font-weight: bold; }

.payment-section { margin-top: 10px; }

.bank-block { margin: 6px 0 6px 20px; line-height: 1.5; }

.closing { margin-top: 18px; font-weight: bold; font-size: 13pt; }

/* ===== MOBILE EXPORT BUTTON (fixed bottom) ===== */
.mobile-export { display: none; }

/* ===== PRINT ===== */
@media print {
  body { background: #fff; }
  .form-panel, .preview-label, .mobile-tabs, .mobile-export { display: none !important; }
  .app-wrap { display: block; }
  .preview-area { padding: 0; }
  .doc { box-shadow: none; margin: 0; padding: 15mm 20mm; width: 100%; }
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {

  /* Tab bar */
  .mobile-tabs {
    display: flex;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    background: #1e2a3a;
    border-bottom: 2px solid #4a7fc1;
    height: 50px;
  }
  .tab-btn {
    flex: 1;
    padding: 0 10px;
    background: transparent;
    color: #8ba8c8;
    border: none;
    border-bottom: 3px solid transparent;
    font-family: Arial, sans-serif;
    font-size: 11pt;
    font-weight: bold;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn.active {
    color: #fff;
    border-bottom-color: #4a7fc1;
  }

  /* Layout stacks vertically */
  .app-wrap {
    display: block;
    padding-top: 50px;
    padding-bottom: 64px;
  }

  /* Form panel: full width, not sticky */
  .form-panel {
    width: 100%;
    height: auto;
    position: relative;
    overflow-y: visible;
    display: none; /* controlled by tab */
  }
  .form-panel.tab-active { display: block; }

  /* Bigger inputs for touch */
  .form-panel input[type="text"],
  .form-panel input[type="number"],
  .form-panel select {
    padding: 10px 10px;
    font-size: 13pt;
    min-height: 44px;
  }
  .pkg-check-row input[type="checkbox"] { width: 20px; height: 20px; }
  .pkg-check-row span { font-size: 12pt; }

  /* Hide desktop export button inside form */
  .form-panel .btn-export { display: none; }

  /* Preview area */
  .preview-area {
    padding: 10px 8px 10px;
    overflow-x: hidden;
    display: none; /* controlled by tab */
  }
  .preview-area.tab-active { display: block; }

  /* Document scales to fit screen */
  .doc {
    transform-origin: top left;
    /* scale set by JS */
  }

  /* Fixed export button at bottom */
  .mobile-export {
    display: block;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 10px 16px;
    background: #1e2a3a;
    border-top: 1px solid #3a5070;
    z-index: 200;
  }
  .mobile-export button {
    width: 100%;
    padding: 13px;
    background: #2a6fc9;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: Arial, sans-serif;
    font-size: 13pt;
    font-weight: bold;
    cursor: pointer;
  }

  .preview-label { font-size: 8pt; margin-bottom: 8px; }
}

/* ===== TOAST ===== */
#cd-toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: #111; color: #fff; padding: 10px 20px; border-radius: 8px;
  font-size: 14px; font-family: Arial, sans-serif; font-weight: 600;
  z-index: 999; display: none; white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25); pointer-events: none;
  transition: opacity 0.3s;
}
</style>
</head>
<body>
<div id="cd-toast"></div>

<!-- ===== MOBILE TAB BAR ===== -->
<div class="mobile-tabs">
  <button class="tab-btn active" id="tabForm" onclick="showTab('form')">📝 Nhập liệu</button>
  <button class="tab-btn" id="tabPreview" onclick="showTab('preview')">👁 Xem trước</button>
</div>

<div class="app-wrap">

  <!-- ===== FORM PANEL ===== -->
  <div class="form-panel tab-active" id="formPanel">
    <h2>⚙ Nhập thông tin báo giá</h2>

    <div class="form-section">
      <div class="form-section-title">Thông tin chung</div>

      <label>Tên khách hàng</label>
      <input type="text" id="tenKH" placeholder="VD: Nhà hàng ABC..." oninput="render()">

      <label>Tháng thực hiện</label>
      <input type="text" id="thang" placeholder="VD: 05" oninput="render()">

      <label>Năm thực hiện</label>
      <input type="text" id="nam" placeholder="VD: 2026" oninput="render()">

      <label>Loại sản phẩm</label>
      <select id="loai" onchange="render()">
        <option value="món ăn">Món ăn</option>
        <option value="đồ uống">Đồ uống</option>
        <option value="sản phẩm">Sản phẩm</option>
        <option value="món ăn / đồ uống">Món ăn / Đồ uống</option>
        <option value="sản phẩm / món ăn / đồ uống">Sản phẩm / Món ăn / Đồ uống</option>
      </select>

      <label>Địa điểm chụp</label>
      <select id="diaDiem" onchange="render()">
        <option value="Studio">Studio</option>
        <option value="địa điểm khách hàng">Địa điểm khách hàng</option>
      </select>

      <label id="labelSlMonYC">Số lượng món (yêu cầu)</label>
      <input type="text" id="slMonYC" placeholder="VD: 15" oninput="render()">
    </div>

    <div class="form-section">
      <div class="form-section-title">Chọn gói dịch vụ</div>

      <!-- Gói 1 -->
      <label class="pkg-check-row">
        <input type="checkbox" id="chk1" onchange="togglePkg(1); render();" checked>
        <span>Gói 1 – Cơ bản</span>
      </label>
      <div class="pkg-fields" id="fields1">
        <label>Chi phí dịch vụ (vnđ)</label>
        <input type="number" id="cp1" value="6000000" min="0" oninput="render()">
        <label id="labelSl1">Số lượng món</label>
        <input type="number" id="sl1" value="12" min="1" oninput="render()">
        <label>Số ảnh chỉnh sửa</label>
        <input type="number" id="anh1" value="24" min="1" oninput="render()">
      </div>

      <!-- Gói 2 -->
      <label class="pkg-check-row">
        <input type="checkbox" id="chk2" onchange="togglePkg(2); render();">
        <span>Gói 2 – Stylist</span>
      </label>
      <div class="pkg-fields" id="fields2" style="display:none;">
        <label>Chi phí dịch vụ (vnđ)</label>
        <input type="number" id="cp2" value="8000000" min="0" oninput="render()">
        <label id="labelSl2">Số lượng món</label>
        <input type="number" id="sl2" value="20" min="1" oninput="render()">
        <label>Số ảnh chỉnh sửa</label>
        <input type="number" id="anh2" value="40" min="1" oninput="render()">
      </div>

      <!-- Gói 3 -->
      <label class="pkg-check-row">
        <input type="checkbox" id="chk3" onchange="togglePkg(3); render();">
        <span>Gói 3 – Cao cấp</span>
      </label>
      <div class="pkg-fields" id="fields3" style="display:none;">
        <label>Chi phí dịch vụ (vnđ)</label>
        <input type="number" id="cp3" value="13000000" min="0" oninput="render()">
        <label id="labelSl3">Số lượng sản phẩm / món</label>
        <input type="number" id="sl3" value="25" min="1" oninput="render()">
        <label>Số ảnh chỉnh sửa</label>
        <input type="number" id="anh3" value="50" min="1" oninput="render()">
      </div>

      <div class="vat-note">VAT mặc định 8% — tự động tính cho từng gói.</div>
    </div>

    <button class="btn-export" onclick="exportWord()">📥 Xuất file Word (.doc)</button>
  </div>

  <!-- ===== PREVIEW AREA ===== -->
  <div class="preview-area" id="previewArea">
    <div class="preview-label">▸ Preview — cập nhật theo thời gian thực</div>
    <div class="doc" id="doc"></div>
  </div>

</div>

<!-- ===== MOBILE EXPORT BUTTON ===== -->
<div class="mobile-export">
  <button onclick="exportWord()">📥 Xuất file Word (.doc)</button>
</div>

<!-- ===== SCRIPT ===== -->
<script>
const VAT = 0.08;

function v(id)   { return document.getElementById(id).value.trim(); }
function chk(id) { return document.getElementById(id).checked; }
function num(id) { return parseFloat(document.getElementById(id).value) || 0; }

function fmt(n) { return n.toLocaleString('vi-VN'); }

function isSP(loai) { return loai.includes('sản phẩm'); }

function calcPkg(cp) {
  const chiPhi = Math.round(cp);
  const vat    = Math.round(chiPhi * VAT);
  const total  = chiPhi + vat;
  return { chiPhi, vat, total };
}

function togglePkg(n) {
  document.getElementById('fields' + n).style.display =
    document.getElementById('chk' + n).checked ? 'block' : 'none';
}

// ──────────────────────────────────────────────
// BUILD TABLE — nội dung động theo loại
// ──────────────────────────────────────────────
function buildPkgTable(pkgNum, chiPhi, slMon, slAnh, loai) {
  const { chiPhi: cp, vat, total } = calcPkg(chiPhi);
  const sp = isSP(loai);

  // Thuật ngữ động
  const donVi    = sp ? 'sản phẩm'                         : 'món/set';
  const phatSinh = sp ? `Phát sinh sản phẩm + 200.000vnđ/1 ảnh`
                      : `Phát sinh món ăn + 300.000vnđ/1 món`;

  let heading = '', subheading = '', col1Content = '', thoiGian = '', extraRows = '';

  // ── GÓI 1 ──
  if (pkgNum === 1) {
    heading   = 'Gói 1: Gói chụp ảnh quảng cáo cơ bản';
    thoiGian  = '9h – 15h';
    col1Content = `
      <strong>Gói chụp ảnh quảng cáo cơ bản</strong>
      <ul class="cell-list">
        <li>Số lượng: ${slMon} ${donVi}</li>
        <li>Bối cảnh, đạo cụ cơ bản</li>
        <li>Chỉnh sửa ${slAnh} ảnh hoàn thiện</li>
        <li>${phatSinh}</li>
      </ul>`;
  }

  // ── GÓI 2 ──
  if (pkgNum === 2) {
    heading  = 'Gói 2: Gói chụp ảnh quảng cáo Stylist';
    thoiGian = '9h – 17h';
    const dieuChinhThu = sp ? 'điều chỉnh sản phẩm phù hợp với chụp ảnh'
                            : 'điều chỉnh món ăn phù hợp với chụp ảnh';
    col1Content = `
      <strong>Gói chụp ảnh concept có Foodstylist</strong>
      <ul class="cell-list">
        <li>Số lượng: ${slMon} ${donVi}</li>
        <li>Đạo cụ, bối cảnh phù hợp với concept chụp</li>
        <li>Foodstylist trang trí, ${dieuChinhThu}</li>
        <li>Chỉnh sửa ${slAnh} ảnh hoàn thiện</li>
        <li>${phatSinh}</li>
      </ul>`;
  }

  // ── GÓI 3 ──
  if (pkgNum === 3) {
    const loaiLabel = sp ? 'sản phẩm' : 'món ăn';
    heading    = `Gói 3: Gói chụp ảnh concept ${loaiLabel} cao cấp`;
    subheading = 'Foodstylist lên ý tưởng sáng tạo, đề xuất concept chụp, chuẩn bị đạo cụ bối cảnh cho dự án chụp hình';
    thoiGian   = '1 ngày';
    const phatSinh3 = sp
      ? `Phát sinh ngoài ${slMon} sản phẩm + 200.000vnđ/1 ảnh`
      : `Phát sinh ngoài ${slMon} món ăn + 300.000vnđ/1 món (set)`;
    col1Content = `
      <strong>Gói chụp ảnh quảng cáo cao cấp</strong>
      <ul class="cell-list">
        <li>Máy ảnh in ấn khổ lớn</li>
        <li>Số lượng: dưới ${slMon} ${donVi}</li>
        <li>Foodstylist chuẩn bị đạo cụ, bối cảnh, trang trí trên set chụp hình</li>
        <li><strong>Nhiều concept thực hiện và đạo cụ hơn cho bộ ảnh</strong></li>
        <li>Chỉnh sửa ${slAnh} ảnh hoàn thiện</li>
        <li>${phatSinh3}</li>
      </ul>`;
    extraRows = `
      <tr class="row-vip">
        <td class="col-stt"></td>
        <td colspan="5">
          <strong>Quyền lợi VIP</strong>
          <ul class="cell-list">
            <li>Can Đăng trực tiếp chụp bộ ảnh</li>
            <li>Tặng chụp ảnh nền trắng sản phẩm: tách phông 25 ảnh hoàn thiện</li>
            <li>Tặng 5 ảnh kết hợp AI từ công nghệ hình ảnh độc quyền</li>
          </ul>
        </td>
      </tr>`;
  }

  return `
    <p class="pkg-heading">${heading}</p>
    ${subheading ? `<p class="pkg-subheading">${subheading}</p>` : ''}
    <table class="baogia-table">
      <thead>
        <tr>
          <th class="col-stt">STT</th>
          <th class="col-nd">Nội dung</th>
          <th class="col-dvt">ĐVT</th>
          <th class="col-dg">Đơn giá<br><em>(vnđ)</em></th>
          <th class="col-tg">Thời gian<br>thực hiện</th>
          <th class="col-tt">Thành tiền<br>(vnđ)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="col-stt"><strong>1</strong></td>
          <td class="col-nd">${col1Content}</td>
          <td class="col-dvt">Trọn gói</td>
          <td class="col-dg">${fmt(cp)}</td>
          <td class="col-tg">${thoiGian}</td>
          <td class="col-tt">${fmt(cp)}</td>
        </tr>
        ${extraRows}
        <tr class="row-summary">
          <td class="col-stt"><strong>2</strong></td>
          <td class="col-nd"><strong>Chi phí dịch vụ</strong></td>
          <td colspan="3" style="text-align:center;"><strong>${fmt(cp)}</strong></td>
          <td class="col-tt"></td>
        </tr>
        <tr class="row-vat">

// ──────────────────────────────────────────────
// CONVERT LISTS → WORD-COMPATIBLE BULLETS
// Word không render list-style-type:disc
// Chuyển <ul><li> thành <p> với ký tự • thực
// ──────────────────────────────────────────────
function convertListsForWord(html) {
  // Bullet trong bảng (cell-list) — dùng padding-left đơn giản, KHÔNG text-indent (WPS bug)
  html = html.replace(
    /<ul[^>]*class="cell-list"[^>]*>([\s\S]*?)<\/ul>/gi,
    function(match, content) {
      const items = [];
      content.replace(/<li>([\s\S]*?)<\/li>/gi, function(m, text) {
        items.push(
          '<p style="margin-top:2px;margin-bottom:3px;margin-left:12pt;' +
          'font-family:\'Times New Roman\',serif;font-size:12pt;line-height:1.4;">' +
          '• ' + text.trim() + '</p>'
        );
      });
      return items.join('');
    }
  );

  // Bullet ngoài bảng (ul thường)
  html = html.replace(
    /<ul>([\s\S]*?)<\/ul>/gi,
    function(match, content) {
      const items = [];
      content.replace(/<li>([\s\S]*?)<\/li>/gi, function(m, text) {
        items.push(
          '<p style="margin-top:2px;margin-bottom:3px;margin-left:16pt;' +
          'font-family:\'Times New Roman\',serif;font-size:13pt;line-height:1.4;">' +
          '• ' + text.trim() + '</p>'
        );
      });
      return items.join('');
    }
  );

  return html;
}

// ──────────────────────────────────────────────
// TOAST
// ──────────────────────────────────────────────
function showToast(msg, dur) {
  dur = dur || 2800;
  const t = document.getElementById('cd-toast');
  t.textContent = msg;
  t.style.display = 'block';
  t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(function() {
    t.style.opacity = '0';
    setTimeout(function() { t.style.display = 'none'; }, 300);
  }, dur);
}

// ──────────────────────────────────────────────
// DOWNLOAD HELPER – Web Share API (Android) → FileSaver → blob URL
// ──────────────────────────────────────────────
async function _dlBlob(blob, name) {
  // Android Chrome: mở share sheet → người dùng chọn Zalo / Lưu vào Files
  if (navigator.share && navigator.canShare) {
    try {
      var sf = new File([blob], name, {type: blob.type || 'application/octet-stream'});
      if (navigator.canShare({files: [sf]})) {
        await navigator.share({files: [sf], title: name});
        return;
      }
    } catch(serr) {
      if (serr.name === 'AbortError') return; // người dùng bấm Huỷ
      // lỗi khác → fallback
    }
  }
  // Desktop / fallback
  if (typeof saveAs !== 'undefined') { saveAs(blob, name); return; }
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
}

// ──────────────────────────────────────────────
// MOBILE: TAB SWITCHING + DOCUMENT SCALE
// ──────────────────────────────────────────────
function showTab(tab) {
  const formPanel   = document.getElementById('formPanel');
  const previewArea = document.getElementById('previewArea');
  const btnForm     = document.getElementById('tabForm');
  const btnPreview  = document.getElementById('tabPreview');

  if (tab === 'form') {
    formPanel.classList.add('tab-active');
    previewArea.classList.remove('tab-active');
    btnForm.classList.add('active');
    btnPreview.classList.remove('active');
  } else {
    formPanel.classList.remove('tab-active');
    previewArea.classList.add('tab-active');
    btnForm.classList.remove('active');
    btnPreview.classList.add('active');
    scaleDoc();
  }
}

function scaleDoc() {
  if (window.innerWidth > 768) return;
  const area  = document.getElementById('previewArea');
  const doc   = document.getElementById('doc');
  if (!area || !doc) return;
  const avail = area.clientWidth - 16; // 8px padding mỗi bên
  const docW  = 794; // 210mm ≈ 794px at 96dpi
  const scale = Math.min(1, avail / docW);
  doc.style.width = docW + 'px';
  doc.style.transform = 'scale(' + scale + ')';
  doc.style.transformOrigin = 'top left';
  // Xoá khoảng trắng thừa do transform:scale để scroll chính xác
  const docH = doc.offsetHeight;
  doc.style.marginBottom = '-' + Math.round(docH * (1 - scale)) + 'px';
}

window.addEventListener('resize', function () {
  if (window.innerWidth <= 768) {
    scaleDoc();
  } else {
    const doc = document.getElementById('doc');
    doc.style.transform = doc.style.transformOrigin = doc.style.marginBottom = '';
  }
});
